<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>مرجع Git الشامل</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;600&family=Cairo:wght@300;400;600;700;900&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0e14;
    --surface: #0f1520;
    --card: #141c2e;
    --border: #1e2d45;
    --accent: #f7931e;
    --accent2: #e84393;
    --green: #39d353;
    --blue: #58a6ff;
    --purple: #bc8cff;
    --red: #ff7b72;
    --yellow: #e3b341;
    --text: #cdd9e5;
    --muted: #6e7f96;
    --mono: 'IBM Plex Mono', monospace;
    --sans: 'Cairo', sans-serif;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--sans);
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* Grid background */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(rgba(247,147,30,0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(247,147,30,0.03) 1px, transparent 1px);
    background-size: 40px 40px;
    pointer-events: none;
    z-index: 0;
  }

  .container { max-width: 1200px; margin: 0 auto; padding: 0 20px; position: relative; z-index: 1; }

  /* Header */
  header {
    padding: 60px 0 40px;
    text-align: center;
    border-bottom: 1px solid var(--border);
    margin-bottom: 40px;
    position: relative;
  }

  header::after {
    content: '';
    position: absolute;
    bottom: -1px;
    left: 50%;
    transform: translateX(-50%);
    width: 200px;
    height: 2px;
    background: linear-gradient(90deg, transparent, var(--accent), transparent);
  }

  .logo {
    display: inline-flex;
    align-items: center;
    gap: 14px;
    margin-bottom: 16px;
  }

  .logo-icon {
    width: 52px; height: 52px;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    border-radius: 12px;
    display: flex; align-items: center; justify-content: center;
    font-size: 26px;
    box-shadow: 0 0 30px rgba(247,147,30,0.4);
  }

  h1 {
    font-size: clamp(2rem, 5vw, 3.2rem);
    font-weight: 900;
    background: linear-gradient(90deg, var(--accent), var(--accent2));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    line-height: 1.2;
  }

  .subtitle {
    color: var(--muted);
    font-size: 1rem;
    margin-top: 10px;
    font-weight: 300;
  }

  /* Stats bar */
  .stats {
    display: flex;
    justify-content: center;
    gap: 30px;
    margin-top: 24px;
    flex-wrap: wrap;
  }

  .stat {
    display: flex;
    align-items: center;
    gap: 8px;
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 8px 16px;
    font-size: 0.85rem;
  }

  .stat-num {
    font-family: var(--mono);
    color: var(--accent);
    font-weight: 600;
  }

  /* Search */
  .search-wrap {
    margin-bottom: 32px;
    position: relative;
  }

  .search-wrap::before {
    content: '🔍';
    position: absolute;
    right: 16px;
    top: 50%;
    transform: translateY(-50%);
    font-size: 1.1rem;
    pointer-events: none;
  }

  #search {
    width: 100%;
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 14px 50px 14px 20px;
    color: var(--text);
    font-family: var(--sans);
    font-size: 1rem;
    outline: none;
    transition: border-color 0.2s, box-shadow 0.2s;
    direction: rtl;
  }

  #search:focus {
    border-color: var(--accent);
    box-shadow: 0 0 0 3px rgba(247,147,30,0.15);
  }

  #search::placeholder { color: var(--muted); }

  /* Category nav */
  .cat-nav {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
    margin-bottom: 32px;
    justify-content: center;
  }

  .cat-btn {
    background: var(--card);
    border: 1px solid var(--border);
    color: var(--muted);
    padding: 7px 16px;
    border-radius: 20px;
    cursor: pointer;
    font-family: var(--sans);
    font-size: 0.85rem;
    transition: all 0.2s;
    display: flex;
    align-items: center;
    gap: 6px;
  }

  .cat-btn:hover, .cat-btn.active {
    border-color: var(--accent);
    color: var(--accent);
    background: rgba(247,147,30,0.08);
  }

  /* Section */
  .section {
    margin-bottom: 48px;
    animation: fadeIn 0.3s ease;
  }

  @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

  .section-header {
    display: flex;
    align-items: center;
    gap: 14px;
    margin-bottom: 20px;
    padding-bottom: 12px;
    border-bottom: 1px solid var(--border);
  }

  .section-icon {
    font-size: 1.5rem;
    width: 42px; height: 42px;
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 10px;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
  }

  .section-title {
    font-size: 1.3rem;
    font-weight: 700;
    color: var(--text);
  }

  .section-desc {
    font-size: 0.85rem;
    color: var(--muted);
    font-weight: 300;
    margin-top: 2px;
  }

  /* Command grid */
  .cmd-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(360px, 1fr));
    gap: 12px;
  }

  /* Command card */
  .cmd-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 16px;
    transition: border-color 0.2s, transform 0.2s, box-shadow 0.2s;
    cursor: pointer;
    position: relative;
    overflow: hidden;
  }

  .cmd-card::before {
    content: '';
    position: absolute;
    top: 0; right: 0;
    width: 3px; height: 100%;
    background: var(--card-accent, var(--accent));
    opacity: 0;
    transition: opacity 0.2s;
  }

  .cmd-card:hover {
    border-color: var(--card-accent, var(--accent));
    transform: translateY(-2px);
    box-shadow: 0 8px 24px rgba(0,0,0,0.3);
  }

  .cmd-card:hover::before { opacity: 1; }

  .cmd-top {
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    gap: 10px;
    margin-bottom: 8px;
  }

  .cmd-code {
    font-family: var(--mono);
    font-size: 0.82rem;
    color: var(--green);
    background: rgba(57,211,83,0.08);
    border: 1px solid rgba(57,211,83,0.2);
    border-radius: 6px;
    padding: 5px 10px;
    flex: 1;
    word-break: break-all;
    line-height: 1.5;
    direction: ltr;
    text-align: left;
  }

  .copy-btn {
    background: none;
    border: 1px solid var(--border);
    color: var(--muted);
    border-radius: 6px;
    padding: 5px 8px;
    cursor: pointer;
    font-size: 0.75rem;
    transition: all 0.2s;
    flex-shrink: 0;
    white-space: nowrap;
  }

  .copy-btn:hover {
    border-color: var(--accent);
    color: var(--accent);
  }

  .copy-btn.copied {
    border-color: var(--green);
    color: var(--green);
  }

  .cmd-name {
    font-weight: 700;
    font-size: 0.95rem;
    color: var(--text);
    margin-bottom: 4px;
  }

  .cmd-desc {
    font-size: 0.83rem;
    color: var(--muted);
    line-height: 1.6;
    font-weight: 300;
  }

  .cmd-tags {
    display: flex;
    gap: 6px;
    flex-wrap: wrap;
    margin-top: 10px;
  }

  .tag {
    font-size: 0.7rem;
    padding: 2px 8px;
    border-radius: 4px;
    font-family: var(--mono);
    border: 1px solid;
  }

  .tag-important { background: rgba(232,67,147,0.1); border-color: rgba(232,67,147,0.3); color: var(--accent2); }
  .tag-danger    { background: rgba(255,123,114,0.1); border-color: rgba(255,123,114,0.3); color: var(--red); }
  .tag-safe      { background: rgba(57,211,83,0.1);  border-color: rgba(57,211,83,0.3);  color: var(--green); }
  .tag-advanced  { background: rgba(188,140,255,0.1); border-color: rgba(188,140,255,0.3); color: var(--purple); }

  /* No results */
  .no-results {
    text-align: center;
    padding: 60px 20px;
    color: var(--muted);
    display: none;
  }

  .no-results .emoji { font-size: 3rem; display: block; margin-bottom: 12px; }

  /* Footer */
  footer {
    text-align: center;
    padding: 32px 0;
    color: var(--muted);
    font-size: 0.8rem;
    border-top: 1px solid var(--border);
    margin-top: 40px;
  }

  .highlight { background: rgba(247,147,30,0.3); border-radius: 3px; padding: 0 2px; }

  @media (max-width: 600px) {
    .cmd-grid { grid-template-columns: 1fr; }
    .stats { gap: 10px; }
  }
</style>
</head>
<body>
<div class="container">
  <header>
    <div class="logo">
      <div class="logo-icon">⎇</div>
      <h1>مرجع Git الشامل</h1>
    </div>
    <p class="subtitle">جميع أوامر Git في مكان واحد — مع شرح كامل بالعربية</p>
    <div class="stats">
      <div class="stat"><span class="stat-num" id="totalCount">0</span><span>أمر</span></div>
      <div class="stat"><span class="stat-num">9</span><span>تصنيف</span></div>
      <div class="stat"><span class="stat-num">⚠️</span><span>مميز بالخطورة</span></div>
    </div>
  </header>

  <div class="search-wrap">
    <input type="text" id="search" placeholder="ابحث عن أمر أو وصف...">
  </div>

  <div class="cat-nav" id="catNav">
    <button class="cat-btn active" data-cat="all">🌐 الكل</button>
    <button class="cat-btn" data-cat="setup">⚙️ الإعداد</button>
    <button class="cat-btn" data-cat="init">🗂️ البداية</button>
    <button class="cat-btn" data-cat="basic">📝 الأساسية</button>
    <button class="cat-btn" data-cat="branch">🌿 الفروع</button>
    <button class="cat-btn" data-cat="remote">🌐 Remote</button>
    <button class="cat-btn" data-cat="history">📜 التاريخ</button>
    <button class="cat-btn" data-cat="undo">↩️ التراجع</button>
    <button class="cat-btn" data-cat="advanced">🔬 متقدم</button>
    <button class="cat-btn" data-cat="stash">📦 Stash</button>
  </div>

  <div id="content"></div>
  <div class="no-results" id="noResults">
    <span class="emoji">🔍</span>
    لا توجد نتائج للبحث عن "<span id="searchTerm"></span>"
  </div>
</div>

<footer>
  <div class="container">
    مرجع Git الشامل · أُعدّ بالعربية · جميع الأوامر موثقة رسمياً من <strong>git-scm.com</strong>
  </div>
</footer>

const catLabels = {
  all: '🌐 الكل', setup: '⚙️ الإعداد', init: '🗂️ البداية',
  basic: '📝 الأساسية', branch: '🌿 الفروع', remote: '🌐 Remote',
  history: '📜 التاريخ', undo: '↩️ التراجع', advanced: '🔬 متقدم', stash: '📦 Stash'
};

const catColors = {
  setup: '#f7931e', init: '#58a6ff', basic: '#39d353',
  branch: '#bc8cff', remote: '#e84393', history: '#e3b341',
  undo: '#ff7b72', advanced: '#bc8cff', stash: '#58a6ff'
};

const catDescs = {
  setup: 'إعداد Git لأول مرة وتخصيصه',
  init: 'بدء مشروع جديد أو استنساخ موجود',
  basic: 'الأوامر اليومية: status, add, commit, diff',
  branch: 'إنشاء الفروع والتنقل بينها والدمج',
  remote: 'التعامل مع GitHub وGitLab والـ remotes',
  history: 'استعراض تاريخ المشروع والـ commits',
  undo: 'التراجع عن الأخطاء واستعادة الكود',
  stash: 'حفظ التغييرات مؤقتاً والعودة إليها',
  advanced: 'أوامر متقدمة للمطورين المحترفين'
};

let activecat = 'all';
let searchQ = '';

document.getElementById('totalCount').textContent = data.length;

function escapeHtml(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function highlightText(text, q) {
  if (!q) return escapeHtml(text);
  const re = new RegExp(`(${q.replace(/[.*+?^${}()|[\]\\]/g,'\\$&')})`, 'gi');
  return escapeHtml(text).replace(re, '<mark class="highlight">$1</mark>');
}

function render() {
  const q = searchQ.trim().toLowerCase();
  const content = document.getElementById('content');
  const noResults = document.getElementById('noResults');

  let filtered = data;
  if (activecat !== 'all') filtered = filtered.filter(c => c.cat === activecat);
  if (q) filtered = filtered.filter(c =>
    c.name.toLowerCase().includes(q) ||
    c.desc.toLowerCase().includes(q) ||
    c.code.toLowerCase().includes(q)
  );

  if (filtered.length === 0) {
    content.innerHTML = '';
    noResults.style.display = 'block';
    document.getElementById('searchTerm').textContent = q;
    return;
  }
  noResults.style.display = 'none';

  // Group by category
  const cats = activecat !== 'all'
    ? [activecat]
    : [...new Set(filtered.map(c => c.cat))];

  content.innerHTML = cats.map(cat => {
    const items = filtered.filter(c => c.cat === cat);
    if (!items.length) return '';
    const color = catColors[cat] || '#f7931e';

    return `<div class="section" data-cat="${cat}">
      <div class="section-header">
        <div class="section-icon">${catLabels[cat]?.split(' ')[0] || '📁'}</div>
        <div>
          <div class="section-title">${catLabels[cat]?.split(' ').slice(1).join(' ') || cat}</div>
          <div class="section-desc">${catDescs[cat] || ''}</div>
        </div>
      </div>
      <div class="cmd-grid">
        ${items.map(cmd => `
          <div class="cmd-card" style="--card-accent:${color}" onclick="copyCmd(this, '${cmd.code.replace(/'/g,"\\'")}')">
            <div class="cmd-top">
              <div class="cmd-code">${highlightText(cmd.code, q)}</div>
              <button class="copy-btn" onclick="event.stopPropagation();copyCmd(this.closest('.cmd-card'),this,'${cmd.code.replace(/'/g,"\\'")}')">نسخ</button>
            </div>
            <div class="cmd-name">${highlightText(cmd.name, q)}</div>
            <div class="cmd-desc">${highlightText(cmd.desc, q)}</div>
            ${cmd.tags.length ? `<div class="cmd-tags">
              ${cmd.tags.map(t => `<span class="tag tag-${t}">${
                t==='important'?'⭐ مهم':t==='danger'?'⚠️ خطير':t==='safe'?'✅ آمن':'🔬 متقدم'
              }</span>`).join('')}
            </div>` : ''}
          </div>
        `).join('')}
      </div>
    </div>`;
  }).join('');
}

function copyCmd(card, btnOrCode, code) {
  const actualCode = typeof btnOrCode === 'string' ? btnOrCode : code;
  navigator.clipboard.writeText(actualCode).then(() => {
    const btn = card.querySelector('.copy-btn');
    if (btn) {
      btn.textContent = '✓ تم';
      btn.classList.add('copied');
      setTimeout(() => { btn.textContent = 'نسخ'; btn.classList.remove('copied'); }, 1500);
    }
  });
}

document.getElementById('search').addEventListener('input', e => {
  searchQ = e.target.value;
  render();
});

document.querySelectorAll('.cat-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.cat-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    activecat = btn.dataset.cat;
    render();
  });
});

render();
</script>
